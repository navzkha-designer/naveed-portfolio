<script>
(function () {
  function init() {
    if (!window.gsap || !window.ScrollTrigger || !document.querySelector('[data-reveal]')) return setTimeout(init, 120);
    gsap.registerPlugin(ScrollTrigger);

    function splitReveal(el, delay) {
      if (!el || el.dataset.split) return;
      el.dataset.split = '1';
      var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
      var nodes = [], n;
      while ((n = walker.nextNode())) nodes.push(n);
      nodes.forEach(function (tn) {
        var words = tn.textContent.split(/(\s+)/);
        var frag  = document.createDocumentFragment();
        words.forEach(function (w) {
          if (/^\s+$/.test(w)) { frag.appendChild(document.createTextNode(w)); }
          else if (w) {
            var o = document.createElement('span'); o.className = 'word-wrap';
            var i = document.createElement('span'); i.className = 'word-inner';
            i.textContent = w; o.appendChild(i); frag.appendChild(o);
          }
        });
        tn.parentNode.replaceChild(frag, tn);
      });
      var inners = el.querySelectorAll('.word-inner');
      gsap.fromTo(inners, { y: '115%', opacity: 0 },
        { y: '0%', opacity: 1, duration: 0.75, stagger: 0.055, ease: 'power3.out', delay: delay || 0 });
    }

    /* Hamburger */
    var ham    = document.getElementById('cs-ham');
    var drawer = document.getElementById('cs-drawer');
    var close  = document.getElementById('cs-close');
    function openDrawer()  { if(drawer) drawer.classList.add('is-open');    document.body.style.overflow='hidden'; }
    function closeDrawer() { if(drawer) drawer.classList.remove('is-open'); document.body.style.overflow=''; }
    if (ham)   ham.addEventListener('click', openDrawer);
    if (close) close.addEventListener('click', closeDrawer);
    if (drawer) drawer.querySelectorAll('.cs-mob-drawer__link').forEach(function(a){
      a.addEventListener('click', closeDrawer);
    });

    /* Sticky nav border */
    var nav = document.getElementById('cs-nav');
    if (nav) {
      window.addEventListener('scroll', function () {
        nav.classList.toggle('is-scrolled', window.scrollY > 10);
      }, { passive: true });
    }

    /* Hero reveal */
    splitReveal(document.querySelector('.cs-hero__title'), 0.2);

    /* Section headings */
    document.querySelectorAll('[data-reveal]').forEach(function (el) {
      if (el === document.querySelector('.cs-hero__title')) return;
      ScrollTrigger.create({
        trigger: el, start: 'top 88%', once: true,
        onEnter: function () { splitReveal(el, 0); }
      });
    });

    /* Section fade-in */
    gsap.utils.toArray('.cs-section').forEach(function (sec) {
      gsap.fromTo(sec, { opacity: 0, y: 24 },
        { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out',
          scrollTrigger: { trigger: sec, start: 'top 92%', once: true } });
    });
  }
  init();
}());
</script>
</body>
</html>
